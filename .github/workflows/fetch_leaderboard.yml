name: Fetch ESPN Leaderboard

on:
  schedule:
    # Every 5 minutes during tournament hours (Thu–Sun, 7am–9pm ET = 11:00–01:00 UTC)
    # GitHub Actions cron is UTC. ET is UTC-4 (EDT) in June/July.
    - cron: '*/5 11-23 * * 4-7'   # Thu–Sun, 11:00–23:59 UTC (7am–7:59pm ET)
    - cron: '*/5 0-1 * * 5-1'     # Fri–Mon, 00:00–01:00 UTC (8pm–9pm ET previous day)
  workflow_dispatch:               # allow manual trigger from GitHub Actions UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # needed to push leaderboard.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ESPN leaderboard fetch
        run: python scripts/fetch_leaderboard.py

      - name: Commit and push leaderboard.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          # Only commit if the file actually changed
          git diff --staged --quiet || git commit -m "chore: update leaderboard.json [skip ci]"
          git push
