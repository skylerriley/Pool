name: Fetch ESPN Leaderboard

on:
  schedule:
    # Every 5 minutes, Thu–Sun 11:00–23:55 UTC (7am–7:55pm ET)
    - cron: '*/5 11-23 * * 4'
    - cron: '*/5 11-23 * * 5'
    - cron: '*/5 11-23 * * 6'
    - cron: '*/5 11-23 * * 0'
    # Every 5 minutes, Thu–Sun 00:00–01:00 UTC (8pm–9pm ET previous evening)
    - cron: '*/5 0-1 * * 4'
    - cron: '*/5 0-1 * * 5'
    - cron: '*/5 0-1 * * 6'
    - cron: '*/5 0-1 * * 0'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run ESPN leaderboard fetch
        run: python scripts/fetch_leaderboard.py

      - name: Commit and push leaderboard.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leaderboard.json
          git diff --staged --quiet || git commit -m "chore: update leaderboard.json [skip ci]"
          git push
