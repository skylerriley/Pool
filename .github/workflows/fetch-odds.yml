name: Fetch Odds

"on":
  schedule:
  
  workflow_dispatch:
  repository_dispatch:
    types: [fetch-odds]

permissions:
  contents: write

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch odds
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORT_KEY: golf_the_open_championship_winner
          MAJOR_LABEL: The Open
        run: python fetch_odds.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/odds.json
          git diff --staged --quiet || git commit -m "Update odds $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
