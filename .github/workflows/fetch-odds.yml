name: Fetch Golf Odds

on:
  schedule:
    # Target cadence: every 20 min (3x/hr). NOTE: GitHub's built-in scheduler
    # is best-effort on free repos and frequently delays or DROPS runs under
    # load — you may see far fewer runs than this. For reliable 20-min cadence,
    # use the external trigger below (see SETUP step "Reliable scheduling").
    # Offset to :07/:27/:47 to dodge the top-of-hour high-load window.
    - cron: '7,27,47 * * * *'
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab
  repository_dispatch:      # external trigger (cron-job.org) — event_type: fetch-odds
    types: [fetch-odds]

jobs:
  fetch-odds:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push odds.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine active major sport key
        id: major
        run: |
          # Edit these two whenever the active tournament changes.
          ACTIVE_MAJOR="golf_pga_championship_winner"
          MAJOR_LABEL="PGA"
          echo "sport_key=$ACTIVE_MAJOR" >> $GITHUB_OUTPUT
          echo "major_label=$MAJOR_LABEL" >> $GITHUB_OUTPUT

      - name: Fetch odds from The Odds API
        id: fetch
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          SPORT_KEY: ${{ steps.major.outputs.sport_key }}
          MAJOR_LABEL: ${{ steps.major.outputs.major_label }}
        run: |
          echo "Fetching odds for $SPORT_KEY at $(date -u) ..."

          RESPONSE=$(curl -sf \
            "https://api.the-odds-api.com/v4/sports/${SPORT_KEY}/odds?regions=us&markets=outrights&oddsFormat=american&apiKey=${ODDS_API_KEY}" \
            -w "\n%{http_code}" \
            --max-time 15)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "API returned HTTP $HTTP_CODE — skipping write"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "$BODY" > /tmp/odds_raw.json

          python3 - <<'PYEOF'
          import json, os, sys
          from collections import defaultdict
          from statistics import median
          from datetime import datetime, timezone

          with open("/tmp/odds_raw.json") as f:
              data = json.load(f)

          major_label = os.environ.get("MAJOR_LABEL", "Unknown")

          if not data:
              print("No events returned by API (tournament may not be open for betting yet)", file=sys.stderr)
              sys.exit(0)

          event = data[0]  # majors return a single event
          bookmakers = event.get("bookmakers", [])

          player_prices = defaultdict(list)
          fanduel_prices = {}

          for bk in bookmakers:
              for market in bk.get("markets", []):
                  if market.get("key") != "outrights":
                      continue
                  for outcome in market.get("outcomes", []):
                      name = outcome["name"]
                      price = outcome["price"]
                      player_prices[name].append(price)
                      if bk["key"] == "fanduel":
                          fanduel_prices[name] = price

          final_odds = {}
          for name, prices in player_prices.items():
              if name in fanduel_prices:
                  final_odds[name] = fanduel_prices[name]
              else:
                  final_odds[name] = int(median(prices))

          # Most recent bookmaker update across all books (when prices last MOVED)
          last_updates = [bk.get("last_update", "") for bk in bookmakers if bk.get("last_update")]
          bookmaker_updated = max(last_updates) if last_updates else ""

          output = {
              "major": major_label,
              "sport_key": event.get("sport_key", ""),
              "fetched_at": datetime.now(timezone.utc).isoformat(),  # when THIS workflow ran
              "bookmaker_updated": bookmaker_updated,                # when odds last changed at the book
              "source": "fanduel_or_median",
              "odds": final_odds
          }

          with open("data/odds.json", "w") as f:
              json.dump(output, f, indent=2)

          print(f"Wrote {len(final_odds)} players to data/odds.json at {output['fetched_at']}")
          PYEOF

          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Commit and push odds.json
        if: steps.fetch.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/odds.json

          # fetched_at changes every run, so this commits on EVERY successful run.
          # That's intentional: the commit history of data/odds.json becomes a
          # complete audit log of when fetches actually happened, which is the
          # easiest way to verify your cadence. (~72 commits/day during a major.)
          if git diff --cached --quiet; then
            echo "Nothing to commit (no odds file change)"
          else
            git commit -m "odds: fetch at $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi
