<!DOCTYPE html>
<html lang="en">
<head>
  <title>Majors Pool Tracking</title>
  <meta name="description" content="The greatest website in the world">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.yourdomain.com/">
  <meta property="og:title" content="Majors Pool Tracking">
  <meta property="og:description" content="The greatest website in the world">
  <meta property="og:image" content="https://skylerriley.github.io/Pool/bigdog.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Majors Pool Tracking">
  <meta name="twitter:description" content="The greatest website in the world">
  <meta name="twitter:image" content="https://skylerriley.github.io/Pool/bigdog.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    /* ─── Design tokens ─── */
    :root {
      --sand:   #F7F3EE;
      --paper:  #FFFFFF;
      --green:  #1B3A2D;
      --green2: #2D5A43;
      --green3: #4A8A6A;
      --gold:   #C4933F;
      --gold2:  #E8B86D;
      --gold3:  #F5DCA8;
      --ink:    #1C1A17;
      --ink2:   #6B6258;
      --ink3:   #A89E94;
      --red:    #C0392B;
      --red2:   #FDECEA;
      --birdie: #2D7D4A;
      --bdr:    rgba(28,26,23,.1);
      --bdr2:   rgba(28,26,23,.06);
      --shadow: 0 1px 3px rgba(28,26,23,.08), 0 4px 12px rgba(28,26,23,.04);
      --shadow2: 0 2px 8px rgba(28,26,23,.12), 0 8px 24px rgba(28,26,23,.06);
    }
    /* Masters overrides */
    .masters {
      --green: #1A4A2E; --green2: #2A6B41; --green3: #4A9E6A;
      --gold: #C8A85A; --gold2: #E8CB8D;
    }
    /* US Open overrides */
    .usopen {
      --green: #1A2B5A; --green2: #243A7A; --green3: #4A66B8;
      --gold: #8B0000; --gold2: #C44; --gold3: #FDECEA;
    }
    /* The Open overrides */
    .theopen {
      --green: #2A1A0A; --green2: #4A2E12; --green3: #7A5A30;
      --gold: #8B0000; --gold2: #C44; --gold3: #FDF0EE;
    }
    /* PGA Championship uses defaults (gold/green) */

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #E8E2DA; }
    body { font-family: 'Montserrat', sans-serif; color: var(--ink); }

    .app {
      background: var(--sand);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }
    @media (min-width: 480px) {
      body { display: flex; justify-content: center; align-items: flex-start; padding: 24px; }
      .app { min-height: auto; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow2); }
    }

    /* ─── Header ─── */
    .header {
      background: var(--green);
      padding: 14px 16px 12px;
      position: relative;
    }
    /* Subtle grass-line texture */
    .header::after {
      content: '';
      display: block;
      height: 3px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    }

    .hdr-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 10px;
    }
    .hdr-left { flex: 1; min-width: 0; }

    /* Year + Major selector row */
    .selector-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: nowrap;
    }
    .year-sel {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .year-sel:focus { outline: none; border-color: var(--gold2); }
    .year-sel option { background: var(--green); color: #fff; }

    .maj-scroll { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; flex: 1; }
    .maj-scroll::-webkit-scrollbar { display: none; }
    .maj-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.75);
      font-size: 11px;
      font-weight: 600;
      padding: 5px 11px;
      border-radius: 20px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all .18s;
      white-space: nowrap;
      flex-shrink: 0;
      min-height: 30px;
      letter-spacing: .2px;
    }
    .maj-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--green);
      font-weight: 700;
    }

    .t-title {
      font-family: 'Oswald', sans-serif;
      font-size: 23px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .t-sub {
      font-size: 12px;
      color: rgba(255,255,255,.6);
      margin-top: 4px;
    }

    .hdr-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .live-badge {
      background: #E74C3C;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
      animation: pulse 2s infinite;
    }
    .hist-badge {
      background: rgba(255,255,255,.15);
      color: rgba(255,255,255,.7);
      font-size: 10px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 20px;
      letter-spacing: .5px;
      display: none;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

    .refresh-btn {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.85);
      font-size: 12px;
      padding: 6px 11px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all .15s;
      white-space: nowrap;
      min-height: 32px;
    }
    .refresh-btn:active { background: rgba(255,255,255,.2); }

    .round-bar {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: rgba(255,255,255,.55);
      margin-bottom: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .round-bar b { color: rgba(255,255,255,.85); font-weight: 600; }
    .round-bar .weekend-txt { color: rgba(255,255,255,.7); font-weight: 500; }

    /* ─── Bottom Nav ─── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--paper);
      border-top: 1px solid var(--bdr);
      display: flex;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
      box-shadow: 0 -4px 20px rgba(28,26,23,.08);
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px 11px;
      cursor: pointer;
      color: var(--ink3);
      transition: color .15s;
      gap: 3px;
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: none;
      font-family: 'Montserrat', sans-serif;
      position: relative;
    }
    .nav-tab:active { background: var(--sand); }
    .nav-tab i { font-size: 22px; line-height: 1; transition: transform .15s; }
    .nav-tab span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .nav-tab.active { color: var(--green); }
    .nav-tab.active i { transform: scale(1.08); }
    .nav-tab.active::before {
      content: '';
      position: absolute;
      top: 0;
      width: 28px;
      height: 2px;
      background: var(--gold);
      border-radius: 0 0 3px 3px;
    }
    /* Push content above the nav */
    .tab-content-wrap { padding-bottom: calc(66px + env(safe-area-inset-bottom)); }

    /* ─── Utility ─── */
    .notice {
      background: var(--gold3);
      border: 1px solid rgba(196,147,63,.25);
      border-radius: 8px;
      margin: 12px 14px;
      padding: 9px 13px;
      font-size: 12px;
      color: var(--ink2);
    }
    .err-box {
      background: var(--red2);
      border: 1px solid rgba(192,57,43,.2);
      border-radius: 8px;
      margin: 12px 14px;
      padding: 12px;
      font-size: 13px;
      color: var(--red);
      line-height: 1.6;
    }
    .sec-lbl {
      font-size: 10px;
      letter-spacing: 1.2px;
      color: var(--ink3);
      text-transform: uppercase;
      padding: 14px 16px 6px;
      font-weight: 600;
    }
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid var(--bdr);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .loading-txt { font-size: 13px; color: var(--ink2); }

    /* ─── Leaderboard table ─── */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    thead th {
      padding: 8px 10px;
      font-size: 10px;
      letter-spacing: .8px;
      color: var(--ink3);
      font-weight: 600;
      text-transform: uppercase;
      border-bottom: 1px solid var(--bdr);
      background: var(--paper);
      text-align: left;
    }
    th.r, td.r { text-align: right; }
    th.c, td.c { text-align: center; }

    tbody tr {
      border-bottom: 1px solid var(--bdr2);
      transition: background .12s;
      background: var(--paper);
    }
    tbody tr:hover { background: #F9F7F4; }
    tbody tr.clk { cursor: pointer; }
    tbody tr.clk:active { background: var(--gold3); }

    /* Leader stripe — left border only on td:first-child via row class */
    tbody tr.rank-1 td:first-child { border-left: 3px solid var(--gold); }
    tbody tr.rank-2 td:first-child { border-left: 3px solid var(--ink3); }
    tbody tr.rank-3 td:first-child { border-left: 3px solid #A0856A; }
    tbody tr.rank-other td:first-child { border-left: 3px solid transparent; }

    td { padding: 12px 10px; vertical-align: middle; font-size: 14px; }

    /* Position number — condensed Oswald for the scoreboard feel */
    .pos-n {
      font-family: 'Oswald', sans-serif;
      font-size: 21px;
      font-weight: 600;
      color: var(--ink3);
    }
    .pos-n.hi { color: var(--gold); }

    .av-flag {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
      user-select: none;
    }
    .pname { font-weight: 600; font-size: 14px; color: var(--ink); line-height: 1.2; }
    .psub { font-size: 11px; color: var(--ink2); margin-top: 2px; }

    /* Score display — the signature element: condensed Oswald numerals */
    .bigsc {
      font-family: 'Oswald', sans-serif;
      font-size: 21px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: .3px;
    }
    .un { color: var(--birdie); }
    .ov { color: var(--red); }
    .ev { color: var(--ink2); }

    .chv { font-size: 13px; color: var(--ink3); transition: transform .2s; display: inline-block; }
    .chv.op { transform: rotate(180deg); }

    /* ─── Drill row ─── */
    .drill td {
      padding: 0 !important;
      background: var(--sand) !important;
      border-bottom: 2px solid var(--bdr) !important;
      overflow: hidden;
    }
    .drill-in { padding: 12px 14px 16px; width: 100%; }
    .drill-ttl {
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 10px;
      font-weight: 600;
    }
    .gg { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; overflow: hidden; }
    .gc {
      background: var(--paper);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 11px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 6px;
      overflow: hidden;
      min-width: 0;
      box-shadow: var(--shadow);
    }
    .gcn { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.3; }
    .gcp { font-size: 11px; color: var(--ink2); margin-top: 2px; }
    .gcr { text-align: right; flex-shrink: 0; }
    .gcsc { font-family: 'Oswald', sans-serif; font-size: 21px; font-weight: 600; letter-spacing: .3px; }
    .gcth { font-size: 11px; color: var(--ink2); margin-top: 1px; }
    .gcth.lv { color: var(--birdie); }
    .cut-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--red2);
      color: var(--red);
      font-weight: 700;
      letter-spacing: .3px;
      margin-left: 4px;
      vertical-align: middle;
    }
    /* ─── Odds badge ─── */
    .odds-line {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      margin-top: 3px;
      font-size: 10px;
      color: var(--ink3);
    }
    .odds-val {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold);
    }
    .odds-val.fav  { color: var(--birdie); }
    .odds-val.long { color: var(--ink2); }

    /* ─── Odds tab ─── */
    .od-toggle-row { padding: 14px 14px 6px; }
    .seg-control {
      display: flex;
      background: var(--sand);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
    }
    .seg-btn {
      flex: 1;
      border: none;
      background: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--ink2);
      padding: 9px 8px;
      border-radius: 7px;
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .seg-btn.active {
      background: var(--green);
      color: #fff;
      box-shadow: var(--shadow);
    }
    .od-meta {
      font-size: 10px;
      letter-spacing: .4px;
      color: var(--ink3);
      padding: 4px 16px 8px;
    }
    .od-meta b { color: var(--ink2); font-weight: 600; }
    .od-empty {
      padding: 40px 24px;
      text-align: center;
      color: var(--ink2);
      font-size: 13px;
      line-height: 1.6;
    }
    .od-empty i { font-size: 30px; color: var(--ink3); display: block; margin-bottom: 10px; }
    /* Implied probability pill in the field table */
    .imp-prob {
      font-size: 11px;
      color: var(--ink2);
      font-weight: 600;
    }
    /* Team odds — bar showing pool share */
    .team-share-bar {
      height: 6px;
      background: var(--sand);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 7px;
    }
    .team-share-fill {
      height: 6px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--green2), var(--green3));
    }
    .od-golfer-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid var(--bdr2);
    }
    .od-golfer-line:last-child { border-bottom: none; }
    .od-golfer-name { color: var(--ink); font-weight: 500; }
    .od-golfer-odds { font-weight: 700; color: var(--gold); font-size: 12px; }
    .od-golfer-odds.fav { color: var(--birdie); }
    .od-golfer-odds.na  { color: var(--ink3); font-weight: 500; }

    /* ─── Stats strip ─── */
    .ts-row {
      display: flex;
      gap: 8px;
      padding: 12px 14px 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .ts-row::-webkit-scrollbar { display: none; }
    .ts {
      flex: 1;
      min-width: 72px;
      background: var(--paper);
      border-radius: 10px;
      border: 1px solid var(--bdr);
      padding: 11px 12px;
      box-shadow: var(--shadow);
    }
    .ts-lbl {
      font-size: 10px;
      letter-spacing: .7px;
      color: var(--ink3);
      text-transform: uppercase;
      font-weight: 600;
    }
    .ts-val {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--green);
      margin-top: 3px;
      line-height: 1;
    }

    /* ─── My Team grid ─── */
    .mt-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      padding: 4px 14px 16px;
    }
    .mtc {
      background: var(--paper);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 12px;
      box-shadow: var(--shadow);
    }
    .mtc.is-cut { border-left: 3px solid var(--red); }
    .mtc-h {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 6px;
    }
    .mtc-nm { font-weight: 600; font-size: 13px; line-height: 1.3; color: var(--ink); }
    .mtc-sc { font-family: 'Oswald', sans-serif; font-size: 23px; font-weight: 600; letter-spacing: .3px; }
    .mtc-pos { font-size: 11px; color: var(--ink2); }
    .rp-row { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
    .rp {
      background: var(--sand);
      border: 1px solid var(--bdr);
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 11px;
      color: var(--ink2);
      font-weight: 500;
    }
    .rp.pen { background: var(--red2); border-color: rgba(192,57,43,.2); color: var(--red); }

    /* ─── Selectors ─── */
    .sel-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 6px;
      flex-wrap: wrap;
    }
    .sel-lbl { font-size: 13px; color: var(--ink2); flex-shrink: 0; font-weight: 500; }
    select {
      background: var(--paper);
      border: 1px solid var(--bdr);
      color: var(--ink);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      padding: 7px 11px;
      border-radius: 8px;
      max-width: 210px;
      cursor: pointer;
    }
    select:focus { outline: 2px solid var(--gold); outline-offset: 1px; }

    /* ─── Champions tab ─── */
    .champ-sec { padding: 0 14px 6px; }
    .cmaj-ttl {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      padding: 16px 0 8px;
      border-bottom: 2px solid var(--gold);
      margin-bottom: 8px;
      letter-spacing: -.2px;
    }
    .crow {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 4px;
      border-bottom: 1px solid var(--bdr2);
    }
    .cy {
      font-weight: 700;
      font-size: 12px;
      color: var(--gold);
      width: 68px;
      flex-shrink: 0;
      padding-top: 2px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .cwrap { flex: 1; min-width: 0; }
    .cname { font-weight: 600; font-size: 13px; color: var(--ink); margin-bottom: 3px; }
    .cbadges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .badge.t4 { background: var(--gold3); color: #8B5E1A; border: 1px solid rgba(196,147,63,.3); }
    .badge.pk { background: #DDEFEA; color: #1A5C3A; border: 1px solid rgba(45,90,67,.2); }
    .csub { font-size: 11px; color: var(--ink2); }

    /* ─── Analytics ─── */
    .an-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      padding: 14px 14px 10px;
    }
    .ac {
      background: var(--paper);
      border: 1px solid var(--bdr);
      border-radius: 10px;
      padding: 13px;
      box-shadow: var(--shadow);
    }
    .ac-ttl {
      font-size: 10px;
      letter-spacing: .7px;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .ac-big {
      font-family: 'Oswald', sans-serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--green);
      line-height: 1;
    }
    .ac-sub { font-size: 11px; color: var(--ink2); margin-top: 4px; }

<script>
const BASE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS42Jq2JDLP8HJdxyzKQZFoyUJx4WaHpll-89pQSUGVN08IJuLm0oX1WNKcDi2wQJ9POj8twIybvM2c/pub?output=csv&gid=';
const SHEET_URLS = {
  leaderboard:    BASE_URL + '0',
  teams:          BASE_URL + '857167336',
  history:        BASE_URL + '1510498394',
  courses:        BASE_URL + '770739619',
  oldLeaderboard: BASE_URL + '1563163455',
};

const MAJOR_META = {
  masters:{id:'masters',label:'Masters',  emoji:'&#127807;',cls:'masters', majorKey:'Masters'},
  pga:    {id:'pga',   label:'PGA',       emoji:'&#9971;',  cls:'pgachamp',majorKey:'PGA'},
  usopen: {id:'usopen',label:'US Open',   emoji:'&#129413;',cls:'usopen',  majorKey:'US Open'},
  theopen:{id:'theopen',label:'The Open', emoji:'&#127942;',cls:'theopen', majorKey:'The Open'},
};

const FLAGS={USA:'&#127482;&#127480;',ENG:'&#127988;&#917607;&#917602;&#917605;&#917614;&#917607;&#917631;',
  SCO:'&#127988;&#917607;&#917602;&#917619;&#917603;&#917620;&#917631;',
  WAL:'&#127988;&#917607;&#917602;&#917623;&#917612;&#917619;&#917631;',
  NIR:'&#127468;&#127463;',IRL:'&#127470;&#127466;',AUS:'&#127462;&#127482;',NZL:'&#127475;&#127487;',
  RSA:'&#127487;&#127462;',ZAF:'&#127487;&#127462;',CAN:'&#127464;&#127462;',MEX:'&#127474;&#127485;',
  ESP:'&#127466;&#127480;',GER:'&#127465;&#127466;',FRA:'&#127467;&#127479;',ITA:'&#127470;&#127481;',
  SWE:'&#127480;&#127466;',NOR:'&#127475;&#127476;',DEN:'&#127465;&#127472;',JPN:'&#127471;&#127477;',
  KOR:'&#127472;&#127479;',CHN:'&#127464;&#127475;',CHI:'&#127464;&#127473;',ARG:'&#127462;&#127479;',
  BRA:'&#127463;&#127479;',COL:'&#127464;&#127476;',FIJ:'&#127467;&#127471;',THA:'&#127481;&#127469;',
  IND:'&#127470;&#127475;',ZIM:'&#127487;&#127484;',NAM:'&#127475;&#127462;',AUT:'&#127462;&#127481;',
  BEL:'&#127463;&#127466;',NED:'&#127475;&#127473;',GBR:'&#127468;&#127463;',TWN:'&#127481;&#127484;',
  VEN:'&#127483;&#127466;',PUR:'&#127477;&#127479;',PAR:'&#127477;&#127486;'};

const PAY = {top4:175, picker:105};
const CUT_PENALTY = 2;

let activeMajorId  = 'pga';
let activeYear     = '';
let isHistorical   = false;

let GOLFERS      = {};
let PARTICIPANTS = [];
let ALL_TEAMS    = [];
let HISTORY      = [];
let COURSES      = [];
let OLD_GOLFERS  = {};
let OLD_RESULTS  = {};
let expanded = {};
let LIVE_LB_ROWS = [];

/* ─── Helpers ─── */
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return [];
  const headers = splitLine(lines[0]).map(h => h.replace(/^"|"$/g,'').trim().toUpperCase());
  return lines.slice(1).map(line => {
    const vals = splitLine(line).map(v => v.replace(/^"|"$/g,'').trim());
    const obj = {};
    headers.forEach((h,i) => { obj[h] = vals[i] || ''; });
    return obj;
  }).filter(row => Object.values(row).some(v => v !== ''));
}
function splitLine(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += c;
  }
  res.push(cur);
  return res;
}
function toNum(v) {
  if (!v || v === '' || v === '--' || v === '-') return null;
  if (typeof v === 'string' && v.trim().toUpperCase() === 'E') return 0;
  const n = parseFloat(String(v).replace(/[^0-9.\-+]/g,''));
  return isNaN(n) ? null : n;
}
function fs(n) {
  if (n === null || n === undefined) return '&#8212;';
  if (n === 0) return 'E';
  return n > 0 ? '+' + n : '' + n;
}
function sc(n) { return (!n && n !== 0) ? 'ev' : n < 0 ? 'un' : n > 0 ? 'ov' : 'ev'; }
function initials(name) { return name.split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function shortName(name) { const p = name.trim().split(/\s+/); return p.length > 1 ? p[0] + ' ' + p[p.length-1][0] + '.' : p[0]; }
function getFlag(c) { if (!c) return ''; const k = c.trim().toUpperCase().substring(0,3); return FLAGS[k] || ''; }
function isCutStatus(pos, thru) {
  const p = String(pos || '').toUpperCase().trim();
  const t = String(thru || '').toUpperCase().trim();
  return p === 'CUT' || p === 'MDF' || p === 'DQ' || p === 'WD' ||
         t === 'CUT' || t === 'MDF' || t === 'DQ' || t === 'WD';
}
function activeMajorKey() { return MAJOR_META[activeMajorId].majorKey; }
function normMajor(s) { return String(s||'').toLowerCase().trim().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' '); }
function majorIdFromSheetValue(sheetMajor) {
  const norm = normMajor(sheetMajor);
  return Object.values(MAJOR_META).find(m => normMajor(m.majorKey) === norm) || null;
}
function histKey(yr, sheetMajor) {
  const meta = majorIdFromSheetValue(sheetMajor);
  return String(yr).trim() + '||' + (meta ? meta.majorKey : String(sheetMajor).trim());
}
function activeHistKey() { return String(activeYear) + '||' + activeMajorKey(); }
function activeCourse() {
  return COURSES.find(c =>
    String(c.year) === String(activeYear) &&
    normMajor(c.major) === normMajor(activeMajorKey())
  ) || null;
}
function activePar() { const c = activeCourse(); return c ? (parseInt(c.par) || 72) : 72; }

async function fetchCSV(url) {
  const res = await fetch(url + '&t=' + Date.now());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  if (text.includes('<!DOCTYPE') || text.includes('<html')) throw new Error('Got HTML instead of CSV — check tab is published');
  return text;
}

/* ─── Odds ─── */
// Keyed by normalised name → american odds integer
let ODDS = {};
// Array of {name, price} with original casing, for the Field Odds view
let ODDS_LIST = [];
// Metadata about the loaded odds file
let ODDS_META = { fetched: '', bookUpdated: '', major: '', source: '' };

// Map The Odds API sport key → our major key
const ODDS_SPORT_KEY = {
  'Masters':   'golf_masters_tournament_winner',
  'PGA':       'golf_pga_championship_winner',
  'US Open':   'golf_us_open_winner',
  'The Open':  'golf_the_open_championship_winner',
};

// Manual aliases for name mismatches that AREN'T just accents.
// Key and value are both run through normName, so you only need an entry here
// if two sources spell a name differently in a way diacritic-stripping can't fix
// (e.g. "Cam Davis" vs "Cameron Davis", "Si Woo Kim" vs "Siwoo Kim").
// Ludvig Åberg / Aberg is handled automatically by accent stripping below.
const NAME_ALIASES = {
  // 'cam davis': 'cameron davis',
  // 'si woo kim': 'siwoo kim',
};

// Normalise a golfer name for cross-source matching:
// strips diacritics (Å→A, ñ→n, í→i), lowercases, trims, collapses spaces,
// then applies any manual alias.
function normName(s) {
  let n = String(s || '')
    .normalize('NFD')                  // decompose accented letters
    .replace(/[\u0300-\u036f]/g, '')   // remove combining diacritical marks
    .toLowerCase()
    .replace(/[.''-]/g, ' ')           // punctuation → space
    .replace(/\s+/g, ' ')
    .trim();
  if (NAME_ALIASES[n]) n = NAME_ALIASES[n];
  return n;
}

async function loadOdds() {
  // odds.json is written by GitHub Actions; path is relative to the HTML file
  ODDS = {}; ODDS_LIST = []; ODDS_META = { fetched:'', bookUpdated:'', major:'', source:'' };
  try {
    const res = await fetch('data/odds.json?t=' + Date.now());
    if (!res.ok) return;
    const json = await res.json();
    // json shape: { major:"PGA", updated:"ISO", odds:{ "Scottie Scheffler":300, ... } }
    const maj = activeMajorKey();
    if (json.major !== maj) return; // stale file for a different tournament — ignore
    ODDS_META = {
      fetched:     json.fetched_at || json.updated || '',     // when the workflow ran
      bookUpdated: json.bookmaker_updated || '',               // when odds last moved
      major:       json.major || '',
      source:      json.source || ''
    };
    Object.entries(json.odds || {}).forEach(([name, price]) => {
      ODDS[normName(name)] = price;
      ODDS_LIST.push({ name, price });
    });
    ODDS_LIST.sort((a,b) => impliedProb(b.price) - impliedProb(a.price)); // favourites first
  } catch (_) {
    // odds.json may not exist yet — silently skip
  }
}

function hasOdds() { return ODDS_LIST.length > 0 && !isHistorical; }

// Look up odds for a golfer by name; tries full name then last name.
// All matching is accent-insensitive via normName, so the sheet's
// "Ludvig Åberg" matches the odds feed's "Ludvig Aberg" automatically.
function getOdds(golferName) {
  if (!golferName || !Object.keys(ODDS).length) return null;
  const norm = normName(golferName);
  if (ODDS[norm] !== undefined) return ODDS[norm];
  const last = norm.split(' ').slice(-1)[0];
  const match = Object.keys(ODDS).find(k => k.split(' ').slice(-1)[0] === last);
  return match !== undefined ? ODDS[match] : null;
}

// American odds → implied win probability (0–1, includes bookmaker vig)
function impliedProb(american) {
  if (american === null || american === undefined) return 0;
  if (american > 0) return 100 / (american + 100);
  return (-american) / ((-american) + 100);
}

// Probability (0–1) → american odds integer
function probToAmerican(p) {
  if (!p || p <= 0 || p >= 1) return null;
  if (p >= 0.5) return Math.round(-(p / (1 - p)) * 100); // favourite → negative
  return Math.round(((1 - p) / p) * 100);                 // underdog → positive
}

// Format american odds for display: +650, -120, etc.
function fmtOdds(price) {
  if (price === null || price === undefined) return null;
  return price > 0 ? '+' + price : '' + price;
}

// CSS class for the odds value
function oddsClass(price) {
  if (price === null) return '';
  if (price < 0) return 'fav';
  if (price > 3000) return 'long';
  return '';
}

// Build the small odds line HTML for a golfer card
function oddsHtml(golferName, cut) {
  if (cut || isHistorical) return '';
  const price = getOdds(golferName);
  if (price === null) return '';
  const cls = oddsClass(price);
  return '<div class="odds-line">Win odds: <span class="odds-val ' + cls + '">' + fmtOdds(price) + '</span></div>';
}

/* ─── Load all data ─── */
async function loadAllData() {
  const ri = document.getElementById('ri');
  ri.className = 'ti ti-refresh spinning';
  document.getElementById('lb-loading').style.display = 'flex';
  document.getElementById('lb-content').style.display = 'none';
  document.getElementById('lb-error').style.display = 'none';
  expanded = {};
  try {
    const [lbText, teamsText, histText, coursesText, oldText] = await Promise.all([
      fetchCSV(SHEET_URLS.leaderboard),
      fetchCSV(SHEET_URLS.teams),
      fetchCSV(SHEET_URLS.history),
      fetchCSV(SHEET_URLS.courses),
      fetchCSV(SHEET_URLS.oldLeaderboard),
    ]);

    COURSES = processCourses(parseCSV(coursesText));
    ALL_TEAMS = parseCSV(teamsText);
    HISTORY = processHistory(parseCSV(histText));
    processOldLeaderboard(parseCSV(oldText));

    const activeRow = COURSES.find(c => String(c.active).toUpperCase() === 'YES' || c.active === '1' || c.active === 'TRUE');
    if (activeRow) {
      activeYear = String(activeRow.year);
      const matchedMajor = Object.values(MAJOR_META).find(m => normMajor(m.majorKey) === normMajor(activeRow.major));
      if (matchedMajor) activeMajorId = matchedMajor.id;
    } else {
      const years = [...new Set(COURSES.map(c=>String(c.year)))].sort().reverse();
      activeYear = years[0] || '2026';
    }

    buildYearSelector();
    buildMajorBtns();
    updateHeader();

    LIVE_LB_ROWS = parseCSV(lbText);
    processLiveLeaderboard(LIVE_LB_ROWS);
    filterParticipants();

    // Load odds (non-blocking — renders fine without them)
    await loadOdds();

    document.getElementById('upd').textContent = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) + ' ET';
    document.getElementById('lb-loading').style.display = 'none';
    document.getElementById('lb-content').style.display = 'block';

    buildSelectors();
    renderLeaderboard();
    renderMyTeam(PARTICIPANTS[0]?.name || '');
    renderChampions();
    if (document.getElementById('tab-an').style.display !== 'none') onAnView(document.getElementById('an-view').value);
    if (document.getElementById('tab-trn').style.display !== 'none') renderTournament();
    if (document.getElementById('tab-od').style.display !== 'none') renderOdds();

  } catch(e) {
    document.getElementById('lb-loading').style.display = 'none';
    document.getElementById('lb-error').style.display = 'block';
    document.getElementById('lb-error').innerHTML = '<div class="err-box"><strong>Could not load sheet data.</strong><br>' + e.message + '</div>';
  }
  ri.className = 'ti ti-refresh';
}

function processCourses(rows) {
  return rows.map(r => ({
    year:    (r['YEAR']    || '').trim(),
    major:   (r['MAJOR']   || '').trim(),
    course:  (r['COURSE']  || '').trim(),
    par:     parseInt(r['PAR']) || 72,
    yards:   (r['YARDS']   || '').trim(),
    weekend: (r['WEEKEND'] || '').trim(),
    active:  (r['ACTIVE']  || '').trim(),
  })).filter(r => r.year && r.major);
}

function filterParticipants() {
  const maj = activeMajorKey();
  const yr  = String(activeYear);
  const rows = ALL_TEAMS.filter(r => {
    const ry = String(r['YEAR'] || '').trim();
    const rm = (r['MAJOR'] || '').trim();
    return ry === yr && normMajor(rm) === normMajor(maj);
  });
  const map = {};
  rows.forEach(r => {
    const pName = (r['PARTICIPANT NAME'] || r['PARTICIPANT'] || '').trim();
    if (!pName) return;
    const pCountry = (r['COUNTRY'] || r['CTY'] || '').trim();
    if (!map[pName]) map[pName] = {name:pName, country:pCountry, picks:[]};
    ['PICK 1','PICK 2','PICK 3','PICK 4'].forEach(col => {
      const pick = (r[col] || '').trim();
      if (pick) map[pName].picks.push(pick);
    });
  });
  PARTICIPANTS = Object.values(map).map(p => ({
    ...p, initials:initials(p.name), flag:getFlag(p.country), picks:[...new Set(p.picks)]
  }));
}

function processLiveLeaderboard(rows) {
  GOLFERS = {};
  const par = activePar();
  const maj = activeMajorKey();
  const yr  = String(activeYear);

  const hasYearCol = rows.length && rows[0].hasOwnProperty('YEAR');
  const filtered = hasYearCol
    ? rows.filter(r => String(r['YEAR']||'').trim()===yr && (r['MAJOR']||'').trim()===maj)
    : rows;

  filtered.forEach(r => {
    const name = (r['PLAYER'] || r['NAME'] || '').trim();
    if (!name) return;
    const country = (r['COUNTRY'] || r['CTY'] || r['NAT'] || '').trim();
    const pos   = r['POS']  || '&#8212;';
    const thru  = r['THRU'] || '&#8212;';
    const cut   = isCutStatus(pos, thru);

    const r1raw = toNum(r['R1']);
    const r2raw = toNum(r['R2']);
    let   r3raw = toNum(r['R3']);
    let   r4raw = toNum(r['R4']);

    const penaltyRound = par + CUT_PENALTY;
    if (cut) { r3raw = penaltyRound; r4raw = penaltyRound; }

    const scoreRaw = r['SCORE'] || r['TO PAR'] || '';
    const scoreStr = String(scoreRaw).trim().toUpperCase();
    let score = scoreStr === 'E' ? 0 : (toNum(scoreRaw) ?? 0);

    if (cut) {
      if (score === 0 && r1raw !== null && r2raw !== null) {
        const r1isStrokes = r1raw > 30;
        if (r1isStrokes) { score = (r1raw - par) + (r2raw - par); }
        else { score = r1raw + r2raw; }
      }
      score += (CUT_PENALTY * 2);
    }

    const todayRaw = r['TODAY'] || '';
    const today = cut ? 0 : (String(todayRaw).toUpperCase() === 'E' ? 0 : (toNum(todayRaw) || 0));

    const key = name.toUpperCase().replace(/\s+/g,'_');
    const isLive = (()=>{
      if (cut) return false;
      const t = (thru || '').trim();
      if (!t || t === 'F' || t === 'WD' || t === '&#8212;' || t === '-') return false;
      return /^\d{1,2}$/.test(t);
    })();

    GOLFERS[key] = {
      id:key, name, flag:getFlag(country), country,
      pos, score, liveScore:score, today, thru, cut,
      r1:r1raw, r2:r2raw, r3:r3raw, r4:r4raw,
      penaltyRound: cut ? penaltyRound : null,
      live:isLive,
    };
  });

  const maxRnd = Math.max(0, ...Object.values(GOLFERS).map(g=>[g.r1,g.r2,g.r3,g.r4].filter(x=>x!==null).length));
  document.getElementById('rnd-disp').textContent = maxRnd || '—';
}

function processOldLeaderboard(rows) {
  OLD_GOLFERS = {};
  OLD_RESULTS = {};

  rows.forEach(r => {
    const yr  = String(r['YEAR']  || '').trim();
    const maj = (r['MAJOR'] || '').trim();
    const name = (r['PLAYER'] || r['NAME'] || '').trim();
    if (!yr || !maj || !name) return;

    const courseInfo = COURSES.find(c => String(c.year)===yr && normMajor(c.major)===normMajor(maj));
    const par = courseInfo ? courseInfo.par : 72;

    const pos = r['POS'] || '&#8212;';
    const cut = isCutStatus(pos, pos);
    const r1raw = toNum(r['R1']);
    const r2raw = toNum(r['R2']);
    const r3raw = toNum(r['R3']);
    const r4raw = toNum(r['R4']);

    const scoreRaw = r['TRUSCORE'] || r['TO PAR'] || '';
    const scoreStr = String(scoreRaw).trim().toUpperCase();
    let score = scoreStr === 'E' ? 0 : (toNum(scoreRaw) ?? 0);

    if (cut) {
      if (score === 0 && r1raw !== null && r2raw !== null) {
        const r1isStrokes = r1raw > 30;
        if (r1isStrokes) { score = (r1raw - par) + (r2raw - par); }
        else { score = r1raw + r2raw; }
      }
      score += (CUT_PENALTY * 2);
    }

    const country = (r['COUNTRY'] || r['CTY'] || '').trim();
    const mapKey = histKey(yr, maj);
    if (!OLD_GOLFERS[mapKey]) OLD_GOLFERS[mapKey] = {};
    const gKey = name.toUpperCase().replace(/\s+/g,'_');
    OLD_GOLFERS[mapKey][gKey] = {
      id:gKey, name, flag:getFlag(country), country,
      pos, score, liveScore:score, today:0, thru:'F', cut,
      r1:r1raw, r2:r2raw, r3:r3raw, r4:r4raw, live:false,
    };
  });

  const tournamentKeys = [...new Set(Object.keys(OLD_GOLFERS))];
  tournamentKeys.forEach(key => {
    const [yr, maj] = key.split('||');
    const golferMap = OLD_GOLFERS[key];

    const teamRows = ALL_TEAMS.filter(r =>
      String(r['YEAR']||'').trim()===yr && normMajor(r['MAJOR']||'')===normMajor(maj)
    );
    const tMap = {};
    teamRows.forEach(r => {
      const pName = (r['PARTICIPANT NAME'] || r['PARTICIPANT'] || '').trim();
      if (!pName) return;
      if (!tMap[pName]) tMap[pName] = {name:pName, picks:[], flag:getFlag((r['COUNTRY']||'').trim())};
      ['PICK 1','PICK 2','PICK 3','PICK 4'].forEach(col => {
        const pick = (r[col]||'').trim();
        if (pick) tMap[pName].picks.push(pick);
      });
    });

    const teams = Object.values(tMap).map(p => {
      const gs = p.picks.map(n => {
        const gKey = n.trim().toUpperCase().replace(/\s+/g,'_');
        if (golferMap[gKey]) return golferMap[gKey];
        const lower = n.trim().toLowerCase();
        const lastName = lower.split(' ').slice(-1)[0];
        return Object.values(golferMap).find(g => {
          const gl = g.name.toLowerCase();
          return gl === lower || gl.split(' ').slice(-1)[0] === lastName;
        }) || null;
      }).filter(Boolean);
      const total = gs.reduce((a,g)=>a+g.score,0);
      return {...p, gs, total, picks:[...new Set(p.picks)]};
    }).sort((a,b)=>a.total-b.total);

    OLD_RESULTS[key] = teams;
  });
}

function processHistory(rows) {
  return rows.map(r => ({
    year:  (r['YEAR']  || '').trim(),
    major: (r['MAJOR'] || '').trim(),
    t4:    (r['TOP4WINNER']   || r['TOP4 WINNER']   || '').trim(),
    pk:    (r['PICKERWINNER'] || r['PICKER WINNER'] || '').trim(),
    aw:    (r['ACTUALWINNER'] || r['ACTUAL WINNER'] || '').trim(),
  })).filter(r => r.year && r.major);
}

function resolveGolfer(pickName) {
  if (!pickName) return null;
  const key = pickName.trim().toUpperCase().replace(/\s+/g,'_');
  if (GOLFERS[key]) return GOLFERS[key];
  const lower = pickName.trim().toLowerCase();
  const lastName = lower.split(' ').slice(-1)[0];
  return Object.values(GOLFERS).find(g => {
    const gLower = g.name.toLowerCase();
    return gLower === lower || gLower.includes(lower) || lower.includes(gLower) || gLower.split(' ').slice(-1)[0] === lastName;
  }) || null;
}

function computeTeams() {
  return PARTICIPANTS.map(p => {
    const gs = p.picks.map(n => resolveGolfer(n)).filter(Boolean);
    const total    = gs.reduce((a,g)=>a+g.liveScore,0);
    const todaySum = gs.reduce((a,g)=>a+(g.today||0),0);
    const best     = gs.length ? gs.reduce((b,g)=>g.liveScore<b.liveScore?g:b,gs[0]) : null;
    return {...p, gs, total, todaySum, best};
  }).sort((a,b)=>a.total-b.total);
}

function toggleDrill(i) { expanded[i]=!expanded[i]; renderLeaderboard(); }

/* ─── Header / selector updates ─── */
function buildYearSelector() {
  const years = [...new Set(COURSES.map(c=>String(c.year)))].sort().reverse();
  const sel = document.getElementById('year-sel');
  sel.innerHTML = years.map(y=>'<option value="'+y+'"'+(y===String(activeYear)?' selected':'')+'>'+y+'</option>').join('');
}

function buildMajorBtns() {
  document.getElementById('maj-btns').innerHTML = Object.values(MAJOR_META).map(m=>
    '<button class="maj-btn'+(m.id===activeMajorId?' active':'')+'" data-id="'+m.id+'" onclick="onMajorClick(\''+m.id+'\')">'+m.emoji+' '+m.label+'</button>'
  ).join('');
}

function updateHeader() {
  const m = MAJOR_META[activeMajorId];
  const c = activeCourse();
  document.getElementById('app').className = 'app ' + m.cls;
  const title = m.emoji + ' ' + m.label + ' ' + activeYear;
  document.getElementById('t-title').innerHTML = title;
  if (c) {
    document.getElementById('t-sub').textContent = c.course;
    document.getElementById('course-info').textContent = 'Par ' + c.par + (c.yards ? ' · ' + c.yards + ' yds' : '');
    document.getElementById('weekend-info').textContent = c.weekend || '';
  } else {
    document.getElementById('t-sub').textContent = '';
    document.getElementById('course-info').textContent = '';
    document.getElementById('weekend-info').textContent = '';
  }
  const isActive = COURSES.some(c2 => String(c2.year)===String(activeYear) && normMajor(c2.major)===normMajor(activeMajorKey()) && (String(c2.active).toUpperCase()==='YES'||c2.active==='1'||c2.active==='TRUE'));
  document.getElementById('live-badge').style.display = isActive ? '' : 'none';
  document.getElementById('hist-badge').style.display = isActive ? 'none' : '';
  isHistorical = !isActive;

  const todayTh = document.querySelector('#tab-lb thead th:nth-child(5)');
  if (todayTh) todayTh.style.display = isHistorical ? 'none' : '';
}

function onYearChange(yr) { activeYear = yr; switchTournament(); }

function onMajorClick(id) {
  activeMajorId = id;
  document.querySelectorAll('.maj-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  switchTournament();
}

function switchTournament() {
  expanded = {};
  oddsExpanded = {};
  updateHeader();
  const hk = activeHistKey();
  if (!isHistorical) {
    processLiveLeaderboard(LIVE_LB_ROWS);
  } else if (OLD_GOLFERS[hk]) {
    GOLFERS = OLD_GOLFERS[hk] || {};
  }
  filterParticipants();
  buildSelectors();
  renderLeaderboard();
  renderMyTeam(PARTICIPANTS[0]?.name || '');
  if (document.getElementById('tab-trn').style.display !== 'none') renderTournament();
  if (document.getElementById('tab-an').style.display !== 'none') onAnView(document.getElementById('an-view').value);
  // Odds are major-specific — reload then refresh dependent views
  loadOdds().then(() => {
    renderLeaderboard();
    renderMyTeam(document.getElementById('mt-sel').value || PARTICIPANTS[0]?.name || '');
    if (document.getElementById('tab-od').style.display !== 'none') renderOdds();
  });
}

/* ─── Leaderboard render ─── */
function renderLeaderboard() {
  const hk = activeHistKey();
  const ranked = isHistorical && OLD_RESULTS[hk]
    ? OLD_RESULTS[hk]
    : computeTeams();

  if (!ranked.length) {
    document.getElementById('lb-body').innerHTML = '<tr><td colspan="6" style="padding:24px;text-align:center;color:var(--ink2);font-size:13px">No data for this tournament yet.</td></tr>';
    document.getElementById('lb-notice').textContent = isHistorical ? activeYear + ' ' + activeMajorKey() + ' — Final results' : 'Tap a row to see team picks';
    return;
  }

  document.getElementById('lb-notice').textContent = isHistorical
    ? activeYear + ' ' + activeMajorKey() + ' \u2014 Final results \u00b7 Tap a row to see picks'
    : 'Tap a row to see team picks';

  const rankClasses = ['rank-1','rank-2','rank-3'];

  let h = '';
  ranked.forEach((p,i) => {
    const pos = i+1;
    const rankCls = pos <= 3 ? rankClasses[pos-1] : 'rank-other';
    const pCls = pos <= 3 ? 'pos-n hi' : 'pos-n';
    const isOpen = expanded[i];
    const noMatch = (p.picks||[]).filter(n => !resolveGolferInContext(n, hk));
    const flagDisplay = p.flag ? p.flag : '&#127948;';
    const liveIndicator = (!isHistorical && p.gs && p.gs.some(g=>g.live))
      ? '<span style="font-size:9px;color:var(--birdie);margin-left:3px;vertical-align:middle">●</span>' : '';
    const todayCell = isHistorical ? '' :
      '<td class="r"><span class="bigsc ' + sc(p.todaySum) + '" style="font-size:17px">' + fs(p.todaySum||0) + '</span></td>';

    h += '<tr class="' + rankCls + ' clk" onclick="toggleDrill(' + i + ')">' +
      '<td class="' + pCls + ' c">' + pos + '</td>' +
      '<td><div class="av-flag">' + flagDisplay + '</div></td>' +
      '<td><div class="pname">' + p.name + liveIndicator + '</div></td>' +
      '<td class="r"><span class="bigsc ' + sc(p.total) + '">' + fs(p.total) + '</span></td>' +
      todayCell +
      '<td class="c"><span class="chv' + (isOpen?' op':'') + '"><i class="ti ti-chevron-down" style="font-size:13px"></i></span></td>' +
      '</tr>';

    if (isOpen) {
      const golfers = p.gs || [];
      let cards = golfers.map(g => {
        const cutBadge = g.cut ? '<span class="cut-badge">CUT</span>' : '';
        const r3disp = g.r3!==null ? (g.cut?'<span style="color:var(--red)">'+g.r3+'*</span>':g.r3) : '—';
        const r4disp = g.r4!==null ? (g.cut?'<span style="color:var(--red)">'+g.r4+'*</span>':g.r4) : '—';
        const todayLine = (isHistorical||g.cut) ? '' : 'T: <span class="' + sc(g.today) + '">' + fs(g.today) + '</span>';
        return '<div class="gc">' +
          '<div style="min-width:0">' +
            '<div class="gcn">' + (g.flag||'') + ' ' + g.name + cutBadge + '</div>' +
            '<div class="gcp">Pos ' + g.pos + '</div>' +
            oddsHtml(g.name, g.cut) +
            '<div class="gcp" style="margin-top:3px">R1:' + (g.r1!==null?g.r1:'—') + ' R2:' + (g.r2!==null?g.r2:'—') + ' R3:' + r3disp + ' R4:' + r4disp + '</div>' +
          '</div>' +
          '<div class="gcr">' +
            '<div class="gcsc ' + sc(g.score) + '">' + fs(g.score) + '</div>' +
            '<div class="gcth">' + todayLine + '</div>' +
            '<div class="gcth ' + (g.live?'lv':'') + '">' + (g.live?'<span class="live-dot"></span>':'') + g.thru + '</div>' +
          '</div>' +
        '</div>';
      }).join('');
      const drillCols = isHistorical ? 5 : 6;
      h += '<tr class="drill"><td colspan="' + drillCols + '" style="max-width:0;overflow:hidden"><div class="drill-in">' +
        '<div class="drill-ttl">' + p.name + '\'s picks</div>' +
        '<div class="gg">' + cards + '</div>' +
        (noMatch.length ? '<div style="margin-top:8px;font-size:11px;color:var(--ink2)">⚠ Unmatched: ' + noMatch.join(', ') + '</div>' : '') +
        (golfers.some(g=>g.cut) ? '<div style="margin-top:6px;font-size:10px;color:var(--red)">* = Par+2 penalty per missed round</div>' : '') +
        '</div></td></tr>';
    }
  });
  document.getElementById('lb-body').innerHTML = h;
}

function resolveGolferInContext(pickName, hk) {
  if (!pickName) return null;
  if (isHistorical && OLD_GOLFERS[hk]) {
    const gMap = OLD_GOLFERS[hk];
    const key = pickName.trim().toUpperCase().replace(/\s+/g,'_');
    if (gMap[key]) return gMap[key];
    const lower = pickName.trim().toLowerCase();
    const lastName = lower.split(' ').slice(-1)[0];
    return Object.values(gMap).find(g => {
      const gl = g.name.toLowerCase();
      return gl === lower || gl.split(' ').slice(-1)[0] === lastName;
    }) || null;
  }
  return resolveGolfer(pickName);
}

/* ─── My Team ─── */
function renderMyTeam(name) {
  const p = PARTICIPANTS.find(x=>x.name===name);
  if (!p) { document.getElementById('mt-grid').innerHTML=''; return; }
  const hk = activeHistKey();
  const gs = (p.picks||[]).map(n=>resolveGolferInContext(n,hk)).filter(Boolean);
  const total    = gs.reduce((a,g)=>a+g.liveScore,0);
  const todaySum = gs.reduce((a,g)=>a+(g.today||0),0);
  const best     = gs.length ? gs.reduce((b,g)=>g.liveScore<b.liveScore?g:b,gs[0]) : null;
  const histResults = isHistorical && OLD_RESULTS[hk];
  const standing = histResults
    ? (histResults.findIndex(x=>x.name===name)+1)
    : (computeTeams().findIndex(x=>x.name===name)+1);

  document.getElementById('mt-stats').innerHTML =
    '<div class="ts"><div class="ts-lbl">Score</div><div class="ts-val ' + sc(total) + '">' + fs(total) + '</div></div>' +
    (isHistorical ? '' : '<div class="ts"><div class="ts-lbl">Today</div><div class="ts-val ' + sc(todaySum) + '">' + fs(todaySum) + '</div></div>') +
    '<div class="ts"><div class="ts-lbl">Place</div><div class="ts-val">' + standing + '/' + PARTICIPANTS.length + '</div></div>' +
    '<div class="ts"><div class="ts-lbl">Best</div><div class="ts-val ' + (best?sc(best.score):'ev') + '">' + (best?fs(best.score):'—') + '</div></div>';

  document.getElementById('mt-grid').innerHTML = gs.map(g => {
    const r3disp = g.r3!==null ? (g.cut?'<span style="color:var(--red)">'+g.r3+'*</span>':g.r3) : '—';
    const r4disp = g.r4!==null ? (g.cut?'<span style="color:var(--red)">'+g.r4+'*</span>':g.r4) : '—';
    return '<div class="mtc' + (g.cut?' is-cut':'') + '">' +
      '<div class="mtc-h">' +
        '<div style="min-width:0">' +
          '<div class="mtc-nm">' + (g.flag||'') + ' ' + g.name + (g.cut?'<span class="cut-badge">CUT</span>':'') + '</div>' +
          '<div class="mtc-pos">Pos ' + g.pos + ' ' + (g.country||'') + '</div>' +
          oddsHtml(g.name, g.cut) +
        '</div>' +
        '<div style="text-align:right;flex-shrink:0">' +
          '<div class="mtc-sc ' + sc(g.score) + '">' + fs(g.score) + '</div>' +
          (isHistorical ? '' : '<div style="font-size:11px;color:var(--ink2)">' + (g.cut?'':'T: <span class="'+sc(g.today)+'">'+fs(g.today)+'</span>') + '</div>') +
        '</div>' +
      '</div>' +
      '<div class="rp-row">' +
        '<div class="rp">R1:' + (g.r1!==null?g.r1:'—') + '</div>' +
        '<div class="rp">R2:' + (g.r2!==null?g.r2:'—') + '</div>' +
        '<div class="rp' + (g.cut?' pen':'') + '">R3:' + r3disp + '</div>' +
        '<div class="rp' + (g.cut?' pen':'') + '">R4:' + r4disp + '</div>' +
        (isHistorical?'':'<div class="rp">' + g.thru + '</div>') +
      '</div>' +
    '</div>';
  }).join('') || '<div class="err-box" style="grid-column:span 2">No golfers matched for this tournament.</div>';
}

/* ─── Champions ─── */
function renderChampions() {
  const MAJOR_ORDER = ['Masters', 'PGA', 'US Open', 'The Open'];
  const normMaj = m => { const s = (m||'').trim().toUpperCase(); if (s==='MASTERS') return 'Masters'; if (s==='PGA') return 'PGA'; if (s.includes('US')) return 'US Open'; if (s.includes('OPEN')) return 'The Open'; return m; };
  const years = [...new Set(HISTORY.map(h=>h.year))].sort((a,b)=>b-a);
  let h = '';
  years.forEach(yr => {
    const yEntries = HISTORY.filter(x=>x.year===yr);
    if (!yEntries.length) return;
    h += '<div class="champ-sec"><div class="cmaj-ttl">' + yr + '</div>';
    MAJOR_ORDER.forEach(maj => {
      const e = yEntries.find(x => normMaj(x.major) === maj);
      if (!e) return;
      const same = e.t4 === e.pk;
      h += '<div class="crow"><div class="cy">' + maj + '</div><div class="cwrap">';
      if (same) {
        h += '<div class="cbadges"><span class="badge t4">Top 4some</span><span class="badge pk">Picked Winner</span></div><div class="cname">' + e.t4 + '</div>';
      } else {
        h += '<div class="cbadges"><span class="badge t4">Top 4some</span></div><div class="cname">' + e.t4 + '</div>' +
             (e.pk ? '<div class="cbadges" style="margin-top:4px"><span class="badge pk">Picked Winner</span></div><div class="cname">' + e.pk + '</div>' : '');
      }
      h += '<div class="csub" style="margin-top:3px">Winner: ' + e.aw + '</div></div></div>';
    });
    h += '</div>';
  });
  document.getElementById('champ-list').innerHTML = h || '<div class="notice" style="margin:12px">No history data yet.</div>';
}

/* ─── Analytics ─── */
function onAnView(v) {
  document.getElementById('an-p-sel').style.display = v==='participant' ? '' : 'none';
  if (v==='participant') renderParticipantAnalytics(document.getElementById('an-p-sel').value || PARTICIPANTS[0]?.name || '');
  else renderOverviewAnalytics();
}

function getAllHistoricalTeamResults() {
  const results = [];
  Object.entries(OLD_RESULTS).forEach(([key, teams]) => {
    const [yr, maj] = key.split('||');
    teams.forEach((t,i) => {
      results.push({year:yr, major:maj, name:t.name, total:t.total, position:i+1, picks:t.picks, gs:t.gs});
    });
  });
  return results;
}

function renderOverviewAnalytics() {
  const ranked = computeTeams();
  const allHistorical = getAllHistoricalTeamResults();

  const allT = ranked.map(p=>p.total);
  const avg  = ranked.length ? Math.round(allT.reduce((a,b)=>a+b,0)/allT.length) : 0;
  const spread = ranked.length ? Math.abs(ranked[0].total - ranked[ranked.length-1].total) : 0;

  const t4w={}, pkw={};
  HISTORY.forEach(h=>{ if (h.t4) t4w[h.t4]=(t4w[h.t4]||0)+1; if (h.pk) pkw[h.pk]=(pkw[h.pk]||0)+1; });
  const mt4 = Object.entries(t4w).sort((a,b)=>b[1]-a[1])[0]||['—',0];
  const mpk = Object.entries(pkw).sort((a,b)=>b[1]-a[1])[0]||['—',0];

  const pc = {};
  allHistorical.forEach(r => (r.picks||[]).forEach(n=>{pc[n]=(pc[n]||0)+1;}));
  PARTICIPANTS.forEach(p=>p.picks.forEach(n=>{pc[n]=(pc[n]||0)+1;}));
  const topPicks = Object.entries(pc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const totalTeamEntries = allHistorical.length + PARTICIPANTS.length;

  const payRows = [...new Set([...Object.keys(t4w),...Object.keys(pkw)])].map(name=>({
    name: name.split(' ')[0],
    full: name,
    total:(t4w[name]||0)*PAY.top4+(pkw[name]||0)*PAY.picker,
    t4:t4w[name]||0, pk:pkw[name]||0
  })).sort((a,b)=>b.total-a.total);

  const avgFinishes = {};
  allHistorical.forEach(r=>{
    if (!avgFinishes[r.name]) avgFinishes[r.name]=[];
    avgFinishes[r.name].push(r.position);
  });

  document.getElementById('an-body').innerHTML =
    '<div class="an-grid">' +

      '<div class="ac"><div class="ac-ttl">Avg team score</div><div class="ac-big">'+(ranked.length?fs(avg):'—')+'</div><div class="ac-sub">'+PARTICIPANTS.length+' participants</div></div>' +
      '<div class="ac"><div class="ac-ttl">Spread</div><div class="ac-big">'+spread+'</div><div class="ac-sub">1st to last</div></div>' +
      '<div class="ac"><div class="ac-ttl">Most 4some wins</div><div class="ac-big" style="font-size:15px;line-height:1.3">'+shortName(mt4[0])+'</div><div class="ac-sub">'+mt4[1]+' win'+(mt4[1]!==1?'s':'')+'</div></div>' +
      '<div class="ac"><div class="ac-ttl">Most picker wins</div><div class="ac-big" style="font-size:15px;line-height:1.3">'+shortName(mpk[0])+'</div><div class="ac-sub">'+mpk[1]+' correct</div></div>' +
      '<div class="ac"><div class="ac-ttl">Tournaments tracked</div><div class="ac-big">'+(HISTORY.length+1)+'</div><div class="ac-sub">inc. current</div></div>' +
    '</div>' +
    '<div class="an-wide">' +
      '<div class="ac"><div class="ac-ttl">Most-drafted golfers (all-time)</div>' +
        topPicks.map(([n,ct])=>{ const pct=Math.round(ct/Math.max(totalTeamEntries/PARTICIPANTS.length,1)*100); return '<div class="bar-row"><div class="bn">'+n.split(' ').slice(-1)[0]+'</div><div class="bt"><div class="bf" style="width:'+Math.min(pct,100)+'%"></div></div><div class="bp">'+ct+'x</div></div>'; }).join('') +
      '</div>' +
      '<div class="ac"><div class="ac-ttl">Payout ranking</div>' +
        (payRows.length ? payRows.map((r,i)=>'<div class="pay-row"><span class="pay-name">'+(i+1)+'. '+shortName(r.full)+'</span><div style="display:flex;align-items:center;gap:5px"><span class="streak">'+r.t4+'T/'+r.pk+'P</span><span class="pay-amt">$'+r.total+'</span></div></div>').join('') : '<div style="color:var(--ink2);font-size:12px">No history yet</div>') +

    '</div>' +
    (Object.keys(avgFinishes).length ? '<div style="padding:0 14px 14px"><div class="ac"><div class="ac-ttl">Avg historical finish by participant</div>' +
      '<table class="fin-tbl" style="margin-top:8px"><thead><tr><th>Participant</th><th>Avg Pos</th><th>Entries</th><th>Best</th></tr></thead><tbody>' +
      Object.entries(avgFinishes).sort((a,b)=>(a[1].reduce((x,y)=>x+y,0)/a[1].length)-(b[1].reduce((x,y)=>x+y,0)/b[1].length)).map(([name,positions])=>{

        const best=Math.min(...positions);
        return '<tr><td>'+shortName(name)+'</td><td>'+avg2+'</td><td>'+positions.length+'</td><td>'+best+'</td></tr>';
      }).join('') +

function renderParticipantAnalytics(name) {
  const p = PARTICIPANTS.find(x=>x.name===name) || {name, picks:[]};
  const t4w = HISTORY.filter(h=>h.t4===name).length;
  const pkw = HISTORY.filter(h=>h.pk===name).length;
  const earn = t4w*PAY.top4 + pkw*PAY.picker;
  const ranked = computeTeams();
  const standing = ranked.findIndex(x=>x.name===name)+1;

  const allHistorical = getAllHistoricalTeamResults().filter(r=>r.name===name);
  const avgPos = allHistorical.length ? (allHistorical.reduce((a,r)=>a+r.position,0)/allHistorical.length).toFixed(1) : '—';
  const bestPos = allHistorical.length ? Math.min(...allHistorical.map(r=>r.position)) : '—';

  const draftCount = {};
  allHistorical.forEach(r=>(r.picks||[]).forEach(n=>{draftCount[n]=(draftCount[n]||0)+1;}));
  p.picks.forEach(n=>{draftCount[n]=(draftCount[n]||0)+1;});
  const topDrafts = Object.entries(draftCount).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const majList = [...new Set(HISTORY.map(h=>h.major))];
  const mWins = {};
  majList.forEach(m=>{ mWins[m]={t4:HISTORY.filter(h=>h.major===m&&h.t4===name).length,pk:HISTORY.filter(h=>h.major===m&&h.pk===name).length}; });

  const histRows = allHistorical.sort((a,b)=>b.year-a.year);

      '<div class="ac"><div class="ac-ttl">Current standing</div><div class="ac-big">'+(standing>0?standing+'/'+PARTICIPANTS.length:'—')+'</div><div class="ac-sub">This tournament</div></div>' +

      '<div class="ac"><div class="ac-ttl">Best finish</div><div class="ac-big">'+bestPos+'</div><div class="ac-sub">All-time</div></div>' +

/* ─── Tournament tab ─── */
let trnSortKey='pos', trnSortAsc=true;

function trnSort(key) {
  if (trnSortKey===key) { trnSortAsc=!trnSortAsc; }
  else { trnSortKey=key; trnSortAsc=(key==='pos'||key==='name'); }
  document.querySelectorAll('.sort-icon').forEach(el=>{ el.className='sort-icon'; el.innerHTML='&#8645;'; });
  const si = document.getElementById('si-'+key);
  if (si) { si.className='sort-icon on'; si.innerHTML=trnSortAsc?'&#9650;':'&#9660;'; }
  renderTournament();
}

function posToNum(pos) {
  if (!pos||pos==='—'||pos==='WD'||pos==='CUT'||pos==='MDF'||pos==='DQ') return 9999;
  return parseInt(String(pos).replace(/[^0-9]/g,''))||9998;
}

function renderTournament() {
  const hk = activeHistKey();
  const golferSource = (isHistorical && OLD_GOLFERS[hk]) ? Object.values(OLD_GOLFERS[hk]) : Object.values(GOLFERS);
  if (!golferSource.length) {
    document.getElementById('trn-body').innerHTML='<tr><td colspan="6" class="trn-empty">No data for this tournament.</td></tr>';
    return;
  }

  const poolPicks = new Set();
  PARTICIPANTS.forEach(p=>p.picks.forEach(n=>{ const g=resolveGolferInContext(n,hk); if(g) poolPicks.add(g.id); }));

  const live = golferSource.filter(g=>g.live);
  const best = golferSource.slice().sort((a,b)=>a.score-b.score)[0];

  document.getElementById('trn-stats').innerHTML =
    '<div class="trn-stat"><div class="trn-stat-val">'+golferSource.length+'</div><div class="trn-stat-lbl">Field</div></div>' +
    '<div class="trn-stat"><div class="trn-stat-val">'+live.length+'</div><div class="trn-stat-lbl">Playing</div></div>' +
    '<div class="trn-stat"><div class="trn-stat-val">'+poolPicks.size+'</div><div class="trn-stat-lbl">Pool Picks</div></div>' +
    '<div class="trn-stat"><div class="trn-stat-val '+sc(best?best.score:0)+'">'+(best?fs(best.score):'—')+'</div><div class="trn-stat-lbl">Leader</div></div>';

  const trnTodayTh = document.getElementById('trn-today-th');
  if (trnTodayTh) trnTodayTh.style.display = isHistorical ? 'none' : '';

  const query = (document.getElementById('trn-search').value||'').toLowerCase().trim();
  const filter = document.getElementById('trn-filter').value;

  let filtered = golferSource.filter(g => {
    if (query && !g.name.toLowerCase().includes(query) && !(g.country||'').toLowerCase().includes(query)) return false;
    if (filter==='pool' && !poolPicks.has(g.id)) return false;
    if (filter==='live' && !g.live) return false;
    return true;
  });

  filtered.sort((a,b) => {
    let va, vb;
    if (trnSortKey==='pos')        { va=posToNum(a.pos); vb=posToNum(b.pos); }
    else if (trnSortKey==='score') { va=a.score; vb=b.score; }
    else if (trnSortKey==='today') { va=a.today; vb=b.today; }
    else if (trnSortKey==='name')  { return trnSortAsc?a.name.localeCompare(b.name):b.name.localeCompare(a.name); }
    else { va=posToNum(a.pos); vb=posToNum(b.pos); }
    return trnSortAsc ? va-vb : vb-va;
  });

  if (!filtered.length) {
    document.getElementById('trn-body').innerHTML='';
    document.getElementById('trn-empty').style.display='block';
    return;
  }
  document.getElementById('trn-empty').style.display='none';

  let cutInserted=false, h='';
  filtered.forEach((g,i) => {
    const isCutRow = g.cut || g.pos==='WD';
    const prevOk = i>0 && !filtered[i-1].cut && filtered[i-1].pos!=='WD';
    if (isCutRow && !cutInserted && trnSortKey==='pos' && trnSortAsc && prevOk) {
      cutInserted=true;
      h += '<tr class="cut-divider"><td colspan="6"><span class="cut-label-txt">✂ Missed Cut</span></td></tr>';
    }
    const isPicked = poolPicks.has(g.id);
    const posCls = posToNum(g.pos)<=3 ? 'pos-n hi' : 'pos-n';
    const thruDisp = g.live ? '<span class="live-dot"></span>'+g.thru : g.thru;
    h += '<tr class="'+(isPicked?'picked-row':'')+'">' +
      '<td class="'+posCls+' c">'+g.pos+'</td>' +
      '<td style="text-align:center;font-size:20px;padding:10px 10px">'+(g.flag||'🌍')+'</td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">' +
          '<span class="pname" style="font-size:13px">'+g.name+'</span>' +
          (isPicked?'<span class="pool-badge">POOL</span>':'') +
          (g.cut?'<span class="cut-badge">CUT</span>':'') +
        '</div>' +
      '</td>' +
      '<td class="r"><span class="bigsc '+sc(g.score)+'">'+fs(g.score)+'</span></td>' +
      (isHistorical ? '' : '<td class="r"><span style="font-family:\'Oswald\',sans-serif;font-size:17px;font-weight:600;letter-spacing:.3px" class="'+sc(g.today)+'">'+fs(g.today)+'</span></td>') +
      '<td class="r"><span class="gcth'+(g.live?' lv':'')+'" style="font-size:11px">'+thruDisp+'</span></td>' +
    '</tr>';
  });
  document.getElementById('trn-body').innerHTML = h;
}

function renderOdds() {
  const meta = document.getElementById('od-meta');
  const body = document.getElementById('od-body');

  if (!hasOdds()) {
    meta.innerHTML = '';
    body.innerHTML = '<div class="od-empty"><i class="ti ti-coin-off"></i>' +
      (isHistorical
        ? 'Win odds aren\'t available for past tournaments.'
        : 'No live odds loaded yet for ' + activeMajorKey() + '.<br>Odds are fetched automatically a few times an hour during the tournament.') +
      '</div>';
    return;
  }

  // Meta line — "fetched" = when our workflow last pulled; "prices moved" = book's own timestamp
  const fmtTime = iso => {
    if (!iso) return '';
    const d = new Date(iso);
    return isNaN(d) ? '' : d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  };
  const fetchedTxt = fmtTime(ODDS_META.fetched);
  const bookTxt = fmtTime(ODDS_META.bookUpdated);
  meta.innerHTML = 'Tournament-winner odds &middot; <b>' + ODDS_LIST.length + '</b> players priced' +
    (fetchedTxt ? ' &middot; fetched <b>' + fetchedTxt + '</b>' : '');

  if (oddsView === 'field') renderFieldOdds();
  else renderTeamOdds();
}

function renderFieldOdds() {
  const body = document.getElementById('od-body');
  // Which odds-named golfers are picked in the pool (accent-insensitive)
  const pickedLast = new Set();
  PARTICIPANTS.forEach(p => p.picks.forEach(n => {
    const last = normName(n).split(' ').slice(-1)[0];
    pickedLast.add(last);
  }));

  let rows = '';
  ODDS_LIST.forEach((o, i) => {
    const pos = i + 1;
    const prob = impliedProb(o.price);
    const last = normName(o.name).split(' ').slice(-1)[0];
    const isPicked = pickedLast.has(last);
    // Try to find golfer in field for a flag (accent-insensitive fallback)
    let g = resolveGolfer(o.name);
    if (!g || !g.flag) {
      const oNorm = normName(o.name);
      const oLast = oNorm.split(' ').slice(-1)[0];
      g = Object.values(GOLFERS).find(x => {
        const xn = normName(x.name);
        return xn === oNorm || xn.split(' ').slice(-1)[0] === oLast;
      }) || g;
    }
    const flag = g && g.flag ? g.flag : '🌍';
    const posCls = pos <= 3 ? 'pos-n hi' : 'pos-n';
    rows += '<tr class="' + (isPicked ? 'picked-row' : '') + '">' +
      '<td class="' + posCls + ' c">' + pos + '</td>' +
      '<td style="text-align:center;font-size:20px;padding:10px 4px">' + flag + '</td>' +
      '<td><div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px">' +
        '<span class="pname" style="font-size:13px">' + o.name + '</span>' +
        (isPicked ? '<span class="pool-badge">POOL</span>' : '') +
      '</div></td>' +
      '<td class="r"><span class="bigsc ' + oddsClass(o.price) + '">' + fmtOdds(o.price) + '</span></td>' +
      '<td class="r"><span class="imp-prob">' + (prob*100).toFixed(1) + '%</span></td>' +
    '</tr>';
  });

  body.innerHTML =
    '<table class="trn-tbl">' +
      '<thead><tr>' +
        '<th class="c" style="width:36px">Rank</th>' +
        '<th style="width:30px"></th>' +
        '<th>Player</th>' +
        '<th class="r" style="width:64px">Win Odds</th>' +
        '<th class="r" style="width:54px">Prob</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

// Compute each team's combined win probability from their foursome's odds.
// A team "wins" if any of its golfers wins the tournament — mutually exclusive
// events, so we sum the individual implied probabilities. We then normalise
// across all pool teams to get each team's share of the picked field.
function computeTeamOdds() {
  const teams = PARTICIPANTS.map(p => {
    const golfers = (p.picks || []).map(n => {
      const price = getOdds(n);
      return { name: n, price, prob: price !== null ? impliedProb(price) : 0 };
    });
    const teamProb = golfers.reduce((a, g) => a + g.prob, 0);
    return { name: p.name, flag: p.flag, golfers, teamProb };
  });
  const totalProb = teams.reduce((a, t) => a + t.teamProb, 0) || 1;
  teams.forEach(t => { t.share = t.teamProb / totalProb; });
  teams.sort((a, b) => b.teamProb - a.teamProb);
  return teams;
}

    '<th class="r" style="width:62px">Odds</th>' +
    '<th class="r" style="width:58px">Share</th>' +
    '<th style="width:26px"></th>' +
  '</tr></thead><tbody>';

  teams.forEach((t, i) => {
    const pos = i + 1;
    const rankCls = pos <= 3 ? rankClasses[pos-1] : 'rank-other';
    const pCls = pos <= 3 ? 'pos-n hi' : 'pos-n';
    const isOpen = oddsExpanded[i];
    const teamAmerican = probToAmerican(t.share); // odds of winning the POOL (normalised)
    const flagDisplay = t.flag ? t.flag : '🏌';

    h += '<tr class="' + rankCls + ' clk" onclick="toggleOddsTeam(' + i + ')">' +
      '<td class="' + pCls + ' c">' + pos + '</td>' +
      '<td><div class="av-flag">' + flagDisplay + '</div></td>' +
      '<td><div class="pname">' + t.name + '</div></td>' +
      '<td class="r"><span class="bigsc" style="color:var(--green)">' + (teamAmerican!==null?fmtOdds(teamAmerican):'—') + '</span></td>' +
      '<td class="r"><span class="bigsc" style="font-size:17px;color:var(--gold)">' + (t.share*100).toFixed(1) + '%</span></td>' +
      '<td class="c"><span class="chv' + (isOpen?' op':'') + '"><i class="ti ti-chevron-down" style="font-size:13px"></i></span></td>' +
    '</tr>';

    if (isOpen) {
      const sharePct = Math.round((t.share / maxShare) * 100);
      let lines = t.golfers.map(g => {
        const cls = g.price === null ? 'na' : oddsClass(g.price);
        const val = g.price === null ? 'No odds' : fmtOdds(g.price);
        const contrib = g.prob > 0 ? ' &middot; ' + (g.prob*100).toFixed(1) + '%' : '';
        return '<div class="od-golfer-line">' +
          '<span class="od-golfer-name">' + g.name + '<span style="color:var(--ink3);font-weight:500">' + contrib + '</span></span>' +
          '<span class="od-golfer-odds ' + cls + '">' + val + '</span>' +
        '</div>';
      }).join('');
      h += '<tr class="drill"><td colspan="6" style="max-width:0;overflow:hidden"><div class="drill-in">' +
        '<div class="drill-ttl">' + t.name + '\'s foursome</div>' +
        lines +
        '<div class="team-share-bar"><div class="team-share-fill" style="width:' + sharePct + '%"></div></div>' +
        '<div style="margin-top:6px;font-size:10px;color:var(--ink3)">Raw win prob (vs entire field): <b style="color:var(--ink2)">' + (t.teamProb*100).toFixed(1) + '%</b></div>' +
      '</div></td></tr>';
    }
  });
  h += '</tbody></table>';
  body.innerHTML = h;
}

/* ─── Selectors & nav ─── */
function buildSelectors() {
  const opts = PARTICIPANTS.map(p=>'<option value="'+p.name+'">'+p.name+'</option>').join('');
  document.getElementById('mt-sel').innerHTML = opts;
  document.getElementById('an-p-sel').innerHTML = opts;
}

function switchTab(tab) {
  ['trn','lb','od','ch','an'].forEach(t => {
    const btn = document.getElementById('nav-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
  });
  ['lb','mt','trn','od','ch','an'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'block':'none');
  if (tab==='mt')  renderMyTeam(document.getElementById('mt-sel').value);
  if (tab==='trn') renderTournament();
  if (tab==='od')  renderOdds();
  if (tab==='ch')  renderChampions();
  if (tab==='an')  onAnView(document.getElementById('an-view').value);
}

function init() { loadAllData(); }
init();
</script>
</body>
</html>
