<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Ball Splash</title>
  <style>

    /* ============================================
       PHASE 1 — ORIGINAL CODE (UNTOUCHED)
       ============================================ */

    body {
      background-color: #73b758;
    }

    .golfball {
      transform: translate(5em, 10em);
      height: 10px;
      width: 10px;
      animation: roll 5s infinite;
      transition-timing-function: cubic-bezier(.05,.59,1,.59);
    }

    .golfball span {
      position: relative;
      z-index: 100;
      border-radius: 50px;
      height: 100%;
      width: 100%;
      background-color: #fff;
      display: block;
    }

    .golfball:before {
      content: '';
      display: block;
      border-radius: 30px / 10px;
      height: 5px;
      width: 20px;
      opacity: .7;
      background-color: #599b1f;
      position: absolute;
      left: -.6em;
      bottom: .3em;
      transform: rotate(25deg);
      animation: shadow 5s infinite;
    }

    .hole {
      height: 20px;
      width: 60px;
      display: block;
      transform: translate(65em, 13.3em);
    }

    .hole:before {
      content: "";
      display: block;
      border-radius: 30px / 10px;
      height: 20px;
      width: 60px;
      background-color: #599b1f;
    }

    .grass {
      display: block;
      transform: translate(65em, 12.1em);
      width: 80px;
      height: 20px;
      border-bottom: 30px solid #73b758;
      border-bottom-left-radius: 70px;
      border-bottom-right-radius: 70px;
      position: absolute;
      z-index: 7000;
    }

    @keyframes roll {
      0%, 20% {
        transform: translate(-5em, 2em);
        height: 10px;
        width: 10px;
      }
      80% {
        transform: translate(65.9em, 10.1em);
        width: 30px;
        height: 30px;
      }
      98% {
        transform: translate(66em, 10.2em);
      }
      100% {
        transform: translate(66em, 13em);
        width: 30px;
        height: 30px;
      }
    }

    @keyframes shadow {
      0% {
        width: 40px;
        left: -1em;
      }
      40% {
        width: 20px;
        left: -1em;
        opacity: .7;
      }
      100% {
        width: 10px;
        left: -.2em;
        opacity: 0;
      }
    }

    /* ============================================
       PHASE 2 & 3 — NEW SPLASH + FLOOD CODE
       ============================================ */

    #splash-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9000;
    }

    #flood-circle {
      position: absolute;
      border-radius: 50%;
      background: #1a6fc4;
      transform: scale(0);
      transform-origin: center center;
      opacity: 0;
      width: 60px;
      height: 60px;
    }
  </style>
</head>
<body>

  <!-- PHASE 1 — ORIGINAL DOM (UNTOUCHED) -->
  <div class="hole"></div>
  <div class="grass"></div>
  <div class="golfball"><span></span></div>

  <!-- PHASE 2 & 3 — NEW DOM: isolated splash container -->
  <div id="splash-container">
    <svg id="splash-svg" width="100%" height="100%"
         style="position:absolute;top:0;left:0;overflow:visible;"></svg>
    <div id="flood-circle"></div>
  </div>

  <!-- GSAP from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    /* ============================================
       PHASE 2 & 3 — NEW JS (appended below original)
       Hook: animationend on .golfball, filtered to
       e.animationName === 'roll'. Fires exactly when
       the ball is swallowed. Zero original code altered.
       ============================================ */

    (function () {

      /* Finds the hole's screen-space center regardless of CSS transform units */
      function getHoleCenter() {
        const hole = document.querySelector('.hole');
        if (!hole) return { x: window.innerWidth * 0.72, y: window.innerHeight * 0.55 };
        const r = hole.getBoundingClientRect();
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }

      function startSplashSequence() {
        const origin  = getHoleCenter();
        const svg     = document.getElementById('splash-svg');
        const flood   = document.getElementById('flood-circle');
        const masterTl = gsap.timeline();

        /* ── PHASE 2: Liquid Splash ─────────────────────────── */

        /* Droplet configs: dx/dy = peak offset from origin, size in px */
        const dropConfigs = [
          { dx:   0, dy: -130, size: 18, delay: 0.00, dur: 0.55, color: '#42A5F5' },
          { dx: -28, dy: -110, size: 13, delay: 0.04, dur: 0.50, color: '#64B5F6' },
          { dx:  28, dy: -110, size: 13, delay: 0.04, dur: 0.50, color: '#64B5F6' },
          { dx: -50, dy:  -80, size: 10, delay: 0.08, dur: 0.45, color: '#90CAF9' },
          { dx:  50, dy:  -80, size: 10, delay: 0.08, dur: 0.45, color: '#90CAF9' },
          { dx: -14, dy: -150, size:  8, delay: 0.02, dur: 0.60, color: '#BBDEFB' },
          { dx:  14, dy: -150, size:  8, delay: 0.02, dur: 0.60, color: '#BBDEFB' },
          { dx: -60, dy:  -55, size:  7, delay: 0.12, dur: 0.38, color: '#90CAF9' },
          { dx:  60, dy:  -55, size:  7, delay: 0.12, dur: 0.38, color: '#90CAF9' },
          { dx:  -5, dy:  -90, size: 11, delay: 0.06, dur: 0.48, color: '#42A5F5' },
          { dx:   5, dy:  -90, size: 11, delay: 0.06, dur: 0.48, color: '#42A5F5' },
        ];

        /* Thin upward stream */
        const stream = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        stream.setAttribute('fill', '#1E88E5');
        stream.setAttribute('opacity', '0');
        svg.appendChild(stream);

        const ox = origin.x, oy = origin.y;

        masterTl.add(() => {
          gsap.to(stream, {
            opacity: 0.85,
            duration: 0.18,
            onUpdate: function () {
              const prog = this.progress();
              const h = 120 * prog;
              const w = 7;
              stream.setAttribute('d',
                `M${ox - w / 2} ${oy} ` +
                `Q${ox} ${oy - h * 0.6} ${ox} ${oy - h} ` +
                `Q${ox} ${oy - h * 0.6} ${ox + w / 2} ${oy} Z`
              );
            },
            onComplete: () => {
              gsap.to(stream, { opacity: 0, duration: 0.28, delay: 0.15 });
            }
          });
        });

        /* Spawn and animate each droplet as an SVG ellipse */
        dropConfigs.forEach(({ dx, dy, size, delay, dur, color }) => {
          const el = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
          el.setAttribute('cx', ox);
          el.setAttribute('cy', oy);
          el.setAttribute('rx', size / 2);
          el.setAttribute('ry', size * 0.65);
          el.setAttribute('fill', color);
          el.setAttribute('opacity', '0');
          svg.appendChild(el);

          /* Landing y: drops settle slightly below the hole rim */
          const landY = oy + 28 + Math.abs(dx) * 0.28;

          const dropTl = gsap.timeline({ delay });
          dropTl
            .set(el, { attr: { opacity: 0, cx: ox, cy: oy } })
            /* Rise */
            .to(el, {
              duration: dur,
              attr: { cx: ox + dx, cy: oy + dy, opacity: 1 },
              ease: 'power2.out'
            })
            /* Fall with bounce */
            .to(el, {
              duration: dur * 0.9,
              attr: { cx: ox + dx * 1.1, cy: landY, opacity: 0.75 },
              ease: 'bounce.out'
            })
            /* Splat flat and vanish */
            .to(el, {
              duration: 0.18,
              attr: { ry: 2, rx: size * 0.7, opacity: 0 },
              ease: 'power1.in'
            });

          masterTl.add(dropTl, 0);
        });

        /* ── PHASE 3: The Flood ─────────────────────────────── */

        /* Scale factor ensures the circle covers any viewport size */
        const screenDiag  = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
        const floodScale  = (screenDiag * 2.2) / 60;

        flood.style.left            = (ox - 30) + 'px';
        flood.style.top             = (oy - 30) + 'px';
        flood.style.transformOrigin = 'center center';

        /* Flood expands from the hole outward — purely transform: scale() */
        masterTl.to(flood, {
          opacity : 1,
          scale   : floodScale,
          duration: 1.1,
          ease    : 'power2.in',
        }, 0.65);

        /* Three expanding ripple rings right before the flood hits */
        [0, 0.12, 0.24].forEach((ringDelay) => {
          const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          ring.setAttribute('cx', ox);
          ring.setAttribute('cy', oy);
          ring.setAttribute('r', 5);
          ring.setAttribute('fill', 'none');
          ring.setAttribute('stroke', '#64B5F6');
          ring.setAttribute('stroke-width', '2.5');
          ring.setAttribute('opacity', '0');
          svg.appendChild(ring);

          gsap.timeline({ delay: 0.62 + ringDelay })
            .to(ring, { attr: { r: 5,  opacity: 0.9 }, duration: 0.01 })
            .to(ring, { attr: { r: 70, opacity: 0   }, duration: 0.55, ease: 'power1.out' });
        });
      }

      /* ── HOOK ───────────────────────────────────────────────
         Listens for the end of the 'roll' keyframe animation.
         This is the exact millisecond the ball is "in the hole".
         No original functions are rewritten — only a listener added.
         ───────────────────────────────────────────────────── */
      const ball = document.querySelector('.golfball');
      if (ball) {
        ball.addEventListener('animationend', function handler(e) {
          if (e.animationName === 'roll') {
            ball.removeEventListener('animationend', handler);
            startSplashSequence();
          }
        });
      }

    })();
  </script>

</body>
</html>
